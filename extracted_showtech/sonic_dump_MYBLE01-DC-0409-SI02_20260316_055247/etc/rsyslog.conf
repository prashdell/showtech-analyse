###############################################################################
# Managed by Ansible
# file: ansible/roles/acs/templates/rsyslog.conf.j2
###############################################################################
#
#  /etc/rsyslog.conf    Configuration file for rsyslog.
#
#                       For more information see
#                       /usr/share/doc/rsyslog-doc/html/rsyslog_conf.html


#################
#### MODULES ####
#################

$ModLoad imuxsock # provides support for local system logging
$ModLoad imklog   # provides kernel logging support
#$ModLoad immark  # provides --MARK-- message capability

# provides UDP syslog reception
$ModLoad imudp

# Limit above 50K message per second for 5 minutes
#$SystemLogRateLimitInterval 300
#$SystemLogRateLimitBurst 15000000
# TODO: Need to evaluate the burst limit with log priority level.
# For now disabling the rate limit.

$SystemLogRateLimitInterval 0
$SystemLogRateLimitBurst 0
$IMUxSockRateLimitBurst 0
$IMUXSockRateLimitInterval 0

$UDPServerAddress 127.0.0.1 # bind to localhost before udp server run
$UDPServerRun 514

# provides TCP syslog reception
#$ModLoad imtcp
#$InputTCPServerRun 514


###########################
#### GLOBAL DIRECTIVES ####
###########################
#
# Use traditional timestamp format.
# To enable high precision timestamps, comment out the following line.
#
#$ActionFileDefaultTemplate RSYSLOG_TraditionalFileFormat

# Define a custom template
$template SONiCFileFormat,"%timegenerated:1:3:date-rfc3164% %timegenerated:9:10:date-rfc3339% %timegenerated:12:19:date-rfc3339%.%timegenerated:::date-subseconds%%timegenerated:27:32:date-rfc3339% %timegenerated:::date-year% %HOSTNAME% %syslogseverity-text:::uppercase% %syslogtag%%!msg1:::sp-if-no-1st-sp%%!msg1:::drop-last-lf%\n"
$ActionFileDefaultTemplate SONiCFileFormat

# pam_tally log template
$template SONiCTallyFileFormat,"%timegenerated:1:3:date-rfc3164% %timegenerated:9:10:date-rfc3339% %timegenerated:12:19:date-rfc3339%.%timegenerated:::date-subseconds%%timegenerated:27:32:date-rfc3339% %timegenerated:::date-year% %HOSTNAME% %syslogseverity-text:::uppercase% %syslogtag% Warning: User Account for%!msg1:R,ERE,1,BLANK:pam_tally2\(sshd\:auth\)\:\ user(.*)\ \((.*)--end% is locked.\n"

# SONiCForwardingFormat is a RFC5424 compliant template for message forwarding.
# Ideally forwarding template should have used 'timestamp' property to preserve the original timestamp.
# But we used 'timegenerated' to keep timestamps in local log file and remote messages the same.
# Will have to revisit if there are use cases for deploying SONiC as message relay.
$template SONiCForwardingFormat,"<%pri%>1 %timegenerated:::date-rfc3339% %hostname% %app-name% %procid% %msgid% %structured-data% %!msg1%"

#Audit-log template format
$template SONiCAuditFormat,"<%pri%>1 %timegenerated:::date-rfc3339% %hostname% %app-name% %procid% %msgid% %structured-data% [audit] %!msg1%"

# Define broadcast message template (for use with :omusrmsg:)
$template SONiCWallMsgFormat,"\r\nMessage from syslogd@%HOSTNAME% at %timegenerated:1:3:date-rfc3164% %timegenerated:9:10:date-rfc3339% %timegenerated:12:19:date-rfc3339%.%timegenerated:::date-subseconds%%timegenerated:27:32:date-rfc3339% %timegenerated:::date-year% ...\r\n %syslogtag% %!msg1%\n\r"

# Raw msg format
$template SONiCRawMsgFormat,"%!msg1%"

# Use a mutable message string for template output
set $!msg1 = $msg;

#
# Include special config file for interface alias renaming
# (it must preceed all of the rsyslog.d config files)
#
$IncludeConfig /etc/rsyslog-intf-name.conf


#Set remote syslog server
$IncludeConfig /run/rsyslog.d/*.conf


#
# Set the default permissions for all log files.
#
$FileOwner root
$FileGroup adm
$FileCreateMode 0640
$DirCreateMode 0755
$Umask 0022

#
# Where to place spool and state files
#
$WorkDirectory /var/spool/rsyslog

#
# Include all config files in /etc/rsyslog.d/
#
$IncludeConfig /etc/rsyslog.d/*.conf

#
# Suppress duplicate messages and report "message repeated n times"
#
$RepeatedMsgReduction on
$PreserveFQDN on
###############
#### RULES ####
###############
