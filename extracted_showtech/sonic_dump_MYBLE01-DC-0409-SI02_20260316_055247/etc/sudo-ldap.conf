#BASE	dc=example,dc=com
#URI	ldap://ldap.example.com ldap://ldap-master.example.com:666

#SIZELIMIT	12
#TIMELIMIT	15
#DEREF		never

# TLS certificates (needed for GnuTLS)
#TLS_CACERT	/etc/ssl/certs/ca-certificates.crt
TLS_CHECKPEER no

# The distinguished name(DN) of the sudoers search base.

# Debug level for sudo ldap query. (This is deprecated sudo.conf(5))

# LDAP filter to restrict the set of records returned for a sudo LDAP query.

# Whether or not to evaluate the sudoNotBefore and sudoNotAfter attributes

# The distinguished name(DN) of the netgroup search base.

# LDAP filter to restrict the set of records returned for a netgroup LDAP query.

# The URI(s) of the LDAP server(s) to connect to.

# The LDAP protocol version to use
ldap_version 3

# The distinguished name to bind to the server with.
# Optional: default is to bind anonymously.
# Please do not put double quotes around it as they
# would be included literally.

# The credentials to bind with. 
# Optional: default is no credential.

# The distinguished name to bind to the server with
# if the effective user ID is root. Password is
# stored in /etc/libnss-ldap.secret (mode 600)
# Use 'echo -n "mypassword" > /etc/libnss-ldap.secret' instead
# of an editor to create the file.
#rootbinddn cn=root,dc=example,dc=com

# The port.
# Optional: default is 389.
#port 389

# The search scope.
#scope sub
#scope one
#scope base
scope sub

# Search timelimit in seconds (0 for indefinite; default 0)
#timelimit 0
timelimit 0

# Bind/connect timelimit (0 for indefinite; default 30)
#bind_timelimit 30
bind_timelimit 10


# Idle timelimit; client will close connections
# (nss_ldap only) if the server has not been contacted
# for the number of seconds specified below.
#idle_timelimit 3600
idle_timelimit 0

# Netscape SDK LDAPS
#ssl on

# Netscape SDK SSL options
#sslpath /etc/ssl/certs

# OpenLDAP SSL mechanism
# start_tls mechanism uses the normal LDAP port, LDAPS typically 636
#ssl start_tls
