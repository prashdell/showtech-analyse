-A FORWARD -d 01:00:5e:00:00:06 -j DROP
-A FORWARD -d 01:00:5e:00:00:12 -j DROP
-A FORWARD -d 33:33:00:00:00:12 -j DROP
-A FORWARD -p 86DD -d 33:33:ff:00:00:00/ff:ff:ff:00:00:00 -j DROP
-A FORWARD -p 802_1Q -d 33:33:ff:00:00:00/ff:ff:ff:00:00:00 --vlan-encap 86DD -j DROP
-A FORWARD -p 86DD -d 33:33:00:00:00:01 -j DROP
-A FORWARD -p 802_1Q --vlan-encap 86DD -d 33:33:00:00:00:01 -j DROP
-A FORWARD -p 86DD -d 33:33:00:00:00:02 -j DROP
-A FORWARD -p 802_1Q --vlan-encap 86DD -d 33:33:00:00:00:02 -j DROP
-A FORWARD -p 86DD -d 33:33:00:00:00:16 -j DROP
-A FORWARD -p 802_1Q --vlan-encap 86DD -d 33:33:00:00:00:16 -j DROP
-A MCLAG_VTEP_USER_LIST -j RETURN
-A MCLAG_CLIENT_USER_LIST -j RETURN
-A BRIDGE_FILTER_FORWARD_IPV6_NA -j RETURN
