<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <!-- Only allow root to own the LicenseManagement bus. -->
  <policy user="root">
    <allow own_prefix="org.SONiC.LicenseManagement"/>
  </policy>

  <!-- Allow root to invoke everything on the bus. -->
  <policy user="root">
    <allow receive_sender="org.SONiC.LicenseManagement"/>
    <allow send_destination="org.SONiC.LicenseManagement"/>
  </policy>

</busconfig>
