<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <!-- Only root can own the bus -->

  <policy user="root">
    <allow own_prefix="org.SONiC.HostService"/>
  </policy>

  <!-- Allow user "root" to invoke methods on the bus -->
  <policy user="root">
    <allow send_destination="org.SONiC.HostService"/>
    <allow receive_sender="org.SONiC.HostService"/>
  </policy>

  <!-- Allow user frr to invoke methods from keyhandler -->
  <policy user="frr">
    <allow send_destination="org.SONiC.HostService"/>
    <allow receive_sender="org.SONiC.HostService"/>
  </policy>

  <!-- Allow docker group users to invoke methods from keyhandler -->
  <policy group="docker">
    <allow send_destination="org.SONiC.HostService" send_interface="org.SONiC.HostService.keyhandler" send_member="key_ctl"/>
    <allow receive_sender="org.SONiC.HostService"/>
  </policy>

</busconfig>
