<!DOCTYPE busconfig PUBLIC
 "-//freedesktop//DTD D-BUS Bus Configuration 1.0//EN"
 "http://www.freedesktop.org/standards/dbus/1.0/busconfig.dtd">
<busconfig>

  <!-- Only allow root to own the LicenseManagement bus. -->
  <policy user="root">
    <allow own_prefix="org.SONiC.TimeSyncPtp"/>
  </policy>

  <!-- Only allow members of the policy user "root" to invoke
       methods from the ptp.stateget interface -->
  <policy user="root">
    <allow receive_sender="org.SONiC.TimeSyncPtp"
           receive_interface="ptp.stateget"/>
    <allow send_destination="org.SONiC.TimeSyncPtp"
           send_interface="ptp.stateget"/>
  </policy>

</busconfig>
