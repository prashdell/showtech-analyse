###############################################################################
# Managed by sonic-config-engine
###############################################################################
#
# EXAMPLE.conf:
#   An example configuration file for configuring the Net-SNMP agent ('snmpd')
#   See the 'snmpd.conf(5)' man page for details
#
#  Some entries are deliberately commented out, and will need to be explicitly activated
#
###############################################################################

###############################################################################
#
# SNMP agent Engine-Id
#

exactEngineID  0x8000013703b4e9b8e7ce02

###############################################################################
#
#  ACCESS CONTROL
#

                                                 #  system + hrSystem groups only
view   systemonly  included   .1.3.6.1.2.1.1
view   systemonly  included   .1.3.6.1.2.1.25.1

                                                 #  Default access to basic system info






###############################################################################
#
#  SYSTEM INFORMATION
#

#  Note that setting these values here, results in the corresponding MIB objects being 'read-only'
#  See snmpd.conf(5) for more details


                                                 # Application + End-to-End layers
sysServices    72


#
#  Process Monitoring
#
# todo: should we enable snmp based monitoring of sswsyncd and other processes?

# At least one 'sendmail' process, but no more than 10
#proc  sendmail 10 1

#  Walk the UCD-SNMP-MIB::prTable to see the resulting output
#  Note that this table will be empty if there are no "proc" entries in the snmpd.conf file


#
#  Disk Monitoring
#
                               # 10MBs required on root disk, 5% free on /var, 10% free on all other disks
#disk       /     10000
#disk       /var  5%
includeAllDisks  10%

#  Walk the UCD-SNMP-MIB::dskTable to see the resulting output
#  Note that this table will be empty if there are no "disk" entries in the snmpd.conf file


#
#  System Load
#
                               # Unacceptable 1-, 5-, and 15-minute load averages
load   12 10 5

#  Walk the UCD-SNMP-MIB::laTable to see the resulting output
#  Note that this table *will* be populated, even without a "load" entry in the snmpd.conf file



###############################################################################
#
#  ACTIVE MONITORING
#
# Note: disabled snmp traps due to side effect of causing snmpd to listen on all ports (0.0.0.0)
#
#   send SNMPv1  traps
#trapsink     localhost public
#   send SNMPv2c traps
#trap2sink    localhost public
#   send SNMPv2c INFORMs
#informsink   localhost public

#  Note that you typically only want *one* of these three lines
#  Uncommenting two (or all three) will result in multiple copies of each notification.


#
#  Event MIB - automatically generate alerts
#
# Remember to activate the 'createUser' lines above
#iquerySecName   internalUser
#rouser          internalUser
# generate traps on UCD error conditions
#defaultMonitors          yes
#note, this release of snmpd does not support linkUpDownNotifications
# generate traps on linkUp/Down
#linkUpDownNotifications  yes


#
#  AgentX Sub-agents
#
                                           #  Run as an AgentX master agent
master          agentx
# internal socket to allow extension to other docker containers
# Currently the other container using this is docker-fpm-frr
# make sure this line matches bgp:/etc/snmp/frr.conf
# please see testing procedure in the same file to verify this works
# to verify the SNMP docker side look for the following string in the log file:
# INFO snmp-subagent [ax_interface] INFO: Using agentx socket type tcp with path tcp:localhost:3161
# INFO supervisord snmp-subagent INFO:ax_interface:Using agentx socket type tcp with path tcp:localhost:3161
agentxsocket    tcp:localhost:3161
agentxTimeout 30
agentxRetries 10
#
#  SysDescription pass-through
#
#pass -p 10 .1.3.6.1.2.1.1.1 /usr/share/snmp/sysDescr_pass.py
#pass -p 10 .1.3.6.1.2.1.1.2 /usr/share/snmp/sysObjectId_pass.py
pass -p 10 .1.3.6.1.2.1.1.5 /usr/share/snmp/sysName_pass.py

# Begin Configuration derived from ConfigDB
###############################################################################
#
# System Group
#
sysName MYBLE01-DC-0409-SI02
sysLocation bayan lepas,apj,pen,DC,R4R9,SI02
sysContact DellNOC@dell.com


###############################################################################
#
# Communities
#
rocommunity  d311n3t
rocommunity6 d311n3t
rocommunity  F0x42Ump1r3
rocommunity6 F0x42Ump1r3

###############################################################################
#
# VACM Group
#                  name   model  user

group V3AdminG usm  V3Admin
group V3ReadOnly usm  V3User


###############################################################################
#
# VACM Access
#                  name   context   model   level  prefix       read view    write view  notify view

access      V3ReadOnly      ""        usm  auth   exact      systemView   ""   ""
access      V3AdminG      ""        usm  auth   exact      systemView   systemView   ""
access      V3AdminG      ""        usm  priv   exact      systemView   systemView   ""
access      V3ReadOnly      ""        usm  priv   exact      systemView   ""   ""

###############################################################################
#
# Trap receiver configurations
#


###############################################################################
#
# SNMPv3 USM Users
#  username    (MD5|SHA|SHA-256|SHA-384|SHA-512)  authpassphrase  [(DES|AES)  privpassphrase]
#

createUser V3Admin MD5 -l 0x9fb641ba362f1a9f7d6ffedc6f482055 AES -l 0x001e0a1739dc63987a70f350a5c374d4
createUser V3User MD5 -l 0x35df2f0f4ed65c39be98eff500ea4aad AES -l 0x001e0a1739dc63987a70f350a5c374d4

###############################################################################
#
# VACM View
#                               name      type                  oid  [mask]
#

view        systemView      included  .1

###############################################################################
#
# SNMP agent address
#

#  Listen for connections on all ip addresses, including eth0, ipv4 lo
#
agentAddress udp:161
agentAddress udp6:161

# End Configuration derived from ConfigDB
