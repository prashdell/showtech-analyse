## audit log rules

if $syslogtag contains 'sshd' then {
   ## tally_log_rules
   if $msg contains 'pam_tally2' then {
        action(type="omfile" file="/var/log/audit.log" template="SONiCTallyFileFormat")
        stop
   }

   # Exit code 1 indicates that the login is from a remote source, which is valid for the script
   if $msg contains 'pam_exec' then {
       if $msg contains 'python3 failed: exit code 1' or $msg contains 'isConsole failed: exit code 1' then {
           stop
       }
   }
   if $msg contains 'pam_exec' and $msg contains 'isConsole failed: exit code 1' then {
        stop
   }

   if $msg contains 'certificate verify failed' and $msg contains 'TLS: ' then {
        *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
	stop
   }

   if $syslogfacility-text == 'authpriv' then {
       *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
       stop
   }
   if $syslogfacility-text == 'auth' then {
     if $msg contains 'Timeout' or $msg contains 'disconnect' or $msg contains 'password' or $msg contains 'Invalid' then {
         *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
         stop
     }
   }
}

if $syslogfacility-text == 'local4' then {
    if $programname contains 'mgmt-framework' or $programname contains 'telemetry' then {
         *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
    }
}

if $syslogfacility-text == 'user' then {
    if $msg contains 'Previous reboot cause' then {
        *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
    }
}

if $programname == 'systemd' then {
    if $msg contains 'Stopped Serial Getty' then {
        *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
        stop
    }
    if $msg contains 'Service' then {
        *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
    }
}

if $programname == 'login' then {
    if $msg contains 'password' or $msg contains 'session' or $msg contains "FAILED" or $msg contains "failure" then {
        *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
        stop
    }

    # Exit code 1 indicates that the login is from a remote source, which is valid for the script
    if $msg contains 'pam_exec' and $msg contains 'python3 failed: exit code 1' then {
        stop
    }
    
    if $msg contains 'certificate verify failed' and $msg contains 'TLS: ' then {
        *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
	      stop
    }
    if $msg contains 'pam_exec' and $msg contains 'isConsole failed: exit code 1' then {
        stop
    }
}

#snmpd logs with LOCAL4 facility
if $syslogfacility-text == 'local4' then {
    if $programname contains "snmpd" then {
        if ($syslogseverity == 6) then {
            *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
            stop
        }
    }
}

if $programname contains 'ntpd' or $programname contains 'ntp' then {
    *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
}

# Need not add newly added log messages in /var/log/syslog and hence we use stop
if $programname contains 'hostcfgd' then {
    if $msg contains 'sshkeygen' then {
        *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
        stop
    }
}

if $programname contains 'sonic-installer' then {
    *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
}

if $msg contains 'ssh-keygen' then {
    *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
}

if $programname == 'container' then {
    if $msg contains 'start' or $msg contains 'stop' then {
        if ($syslogseverity == 6) then {
            *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
        }
    }
}

if $programname contains 'firmware-updater' then {
    *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
}

if $programname contains 'system' then {
    if $msg contains 'Certificate' and ($msg contains 'expired' or $msg contains 'expiring') then {
        *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
    }
}

# Need not add newly added log messages in /var/log/syslog and hence we use stop
if $programname contains 'keyhandler' then {
    if $msg contains 'ImageVerification' or $msg contains 'ImageGPGInstall' then {
        *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
        stop
    }
}

# Need not add newly added log messages in /var/log/syslog and hence we use stop
if $programname contains 'keyhandler' then {
    if $msg contains 'sshkeygen' then {
        *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
        stop
    }
}

if $programname contains 'rsyslogd' then {
    if $msg contains 'certificate verify failed' or $msg contains 'Certificate error' or $msg contains 'Certificate EXPIRED' or $msg contains 'peer name not authorized' then {
        *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
    }
    if $msg contains 'cannot resolve hostname' or $msg contains 'cannot connect to' or $msg contains 'No route to host' then {
        *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
    }
}

if $programname contains 'radsecproxy' then {
    if $msg contains 'tlsconnect: TLS connection to' or $msg contains 'tlsconnect: SSL connect to' then {
        *.* action(type="omfwd" target="127.0.0.1" Address="127.0.0.1" port="514" protocol="udp" Template="SONiCAuditFormat")
    }
}
